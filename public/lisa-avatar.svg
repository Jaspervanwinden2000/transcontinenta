<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F1F28"/>
      <stop offset="100%" stop-color="#2C1416"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C9A0"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Red top accent -->
  <rect x="0" y="0" width="100" height="5" rx="4" fill="#D61E23"/>
  <!-- Shoulders / body -->
  <ellipse cx="50" cy="96" rx="32" ry="18" fill="#2A2A35"/>
  <!-- Neck -->
  <rect x="43" y="70" width="14" height="14" rx="4" fill="url(#face)"/>
  <!-- Head -->
  <ellipse cx="50" cy="55" rx="20" ry="22" fill="url(#face)"/>
  <!-- Hair top -->
  <ellipse cx="50" cy="36" rx="20" ry="10" fill="#1A1A1A"/>
  <!-- Hair sides -->
  <ellipse cx="31" cy="52" rx="6" ry="14" fill="#1A1A1A"/>
  <ellipse cx="69" cy="52" rx="6" ry="14" fill="#1A1A1A"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="54" rx="3.5" ry="4" fill="#1A1A1A"/>
  <ellipse cx="58" cy="54" rx="3.5" ry="4" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="43.5" cy="52.5" r="1.2" fill="white"/>
  <circle cx="59.5" cy="52.5" r="1.2" fill="white"/>
  <!-- Subtle smile -->
  <path d="M44 63 Q50 67 56 63" stroke="#C08060" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Red badge bottom-right -->
  <rect x="62" y="76" width="26" height="14" rx="7" fill="#D61E23"/>
  <text x="75" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="8.5" fill="white">AI</text>
</svg>
